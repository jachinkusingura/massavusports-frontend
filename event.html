<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MassavuSports | Article</title>
    <!-- Performance: pre-establish connections -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="http://127.0.0.1:5000">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .event-header {
            margin-bottom: 2rem;
        }

        .event-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            color: var(--text-muted);
            margin: 1rem 0;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .event-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .event-hero {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: var(--radius-lg);
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            background: #e5e7eb;
            transition: opacity 0.4s ease;
        }

        .event-content {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 3rem;
            background: var(--bg-card);
            padding: 3rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }

        .event-content p {
            margin-bottom: 1.5rem;
        }

        .tags-container {
            margin-bottom: 2rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .comments-section {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            margin-bottom: 4rem;
        }

        .comment-form textarea {
            width: 100%;
            padding: 1rem;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            margin-bottom: 1rem;
            font-family: inherit;
            resize: vertical;
        }

        .comment-form input {
            padding: 0.8rem;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            flex: 1;
        }

        .comment {
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .comment:last-child {
            border-bottom: none;
        }

        .comment-author {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .comment-date {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: normal;
        }

        /* ── Skeleton shimmer ── */
        @keyframes shimmer {
            0% {
                background-position: -600px 0;
            }

            100% {
                background-position: 600px 0;
            }
        }

        .skeleton {
            background: linear-gradient(90deg, #1e2535 25%, #2a3248 50%, #1e2535 75%);
            background-size: 600px 100%;
            animation: shimmer 1.4s infinite linear;
            border-radius: 6px;
            display: block;
        }

        .sk-title {
            height: 42px;
            width: 85%;
            margin-bottom: 1.2rem;
        }

        .sk-title-sm {
            height: 32px;
            width: 55%;
            margin-bottom: 0.8rem;
        }

        .sk-meta {
            height: 18px;
            width: 60%;
            margin-bottom: 0.6rem;
        }

        .sk-hero {
            width: 100%;
            height: 400px;
            border-radius: var(--radius-lg);
            margin-bottom: 2rem;
        }

        .sk-line {
            height: 16px;
            width: 100%;
            margin-bottom: 0.9rem;
        }

        .sk-line-sm {
            height: 16px;
            width: 70%;
            margin-bottom: 0.9rem;
        }

        .sk-tag {
            height: 26px;
            width: 80px;
            border-radius: 20px;
            display: inline-block;
            margin-right: 0.4rem;
        }

        /* ── Circular progress overlay ── */
        #loadingOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(7, 10, 18, 0.55);
            backdrop-filter: blur(3px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }

        #loadingOverlay.visible {
            display: flex;
        }

        .circular-spinner {
            width: 60px;
            height: 60px;
        }

        .circular-spinner circle {
            fill: none;
            stroke-width: 5;
            stroke-linecap: round;
            transform-origin: 50% 50%;
        }

        .spinner-track {
            stroke: rgba(255, 255, 255, 0.12);
        }

        .spinner-arc {
            stroke: #e53e3e;
            stroke-dasharray: 110;
            stroke-dashoffset: 110;
            animation: spin-arc 1s ease-in-out infinite;
        }

        @keyframes spin-arc {
            0% {
                stroke-dashoffset: 110;
                transform: rotate(0deg);
            }

            50% {
                stroke-dashoffset: 30;
                transform: rotate(180deg);
            }

            100% {
                stroke-dashoffset: 110;
                transform: rotate(360deg);
            }
        }

        .loading-label {
            color: #fff;
            font-size: 0.9rem;
            letter-spacing: 0.06em;
            opacity: 0.85;
        }
    </style>
    <link rel="icon" type="image/x-icon" href="favicon.ico">`n
</head>

<body>

    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="Logo"
                    style="height: 35px; width: auto; object-fit: contain; margin-right: 8px;">
                Massavu<span>Sports</span>
            </a>
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass text-muted"></i>
                <input type="text" placeholder="Search events...">
            </div>
            <nav class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="category.html">Uganda League</a>
                <a href="category.html">Local Tournaments</a>
            </nav>
            <button class="mobile-menu-btn" id="mobile-menu-btn"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <!-- Circular progress overlay (shown only while network request is in-flight) -->
    <div id="loadingOverlay">
        <svg class="circular-spinner" viewBox="0 0 60 60">
            <circle class="spinner-track" cx="30" cy="30" r="24" />
            <circle class="spinner-arc" cx="30" cy="30" r="24" />
        </svg>
        <span class="loading-label">Loading post&hellip;</span>
    </div>

    <main class="container" style="padding: 3rem 1.5rem; max-width: 1000px;">
        <article id="eventDetail">
            <div class="event-header">
                <!-- Skeleton title -->
                <span class="skeleton sk-title" id="skTitle"></span>
                <span class="skeleton sk-title-sm" id="skTitleSm"></span>
                <div class="event-meta" id="skMeta" style="gap: 1rem;">
                    <span class="skeleton sk-meta" style="width:180px;"></span>
                    <span class="skeleton sk-meta" style="width:140px;"></span>
                    <span class="skeleton sk-meta" style="width:100px;"></span>
                </div>
                <!-- Real title / meta (hidden until data arrives) -->
                <h1 id="eventTitle" style="font-size: 3rem; margin: 1rem 0; line-height: 1.2; display:none;"></h1>
                <div class="event-meta" id="eventMetaReal" style="display:none;">
                    <span id="eventDate"><i class="fa-regular fa-calendar text-accent"></i> Date</span>
                    <span id="eventLocation"><i class="fa-solid fa-location-dot text-accent"></i> Location</span>
                    <span id="eventViews"><i class="fa-solid fa-eye text-muted"></i> 0 Views</span>
                </div>
            </div>

            <!-- Skeleton hero -->
            <span class="skeleton sk-hero" id="skHero"></span>
            <img id="eventHero" src="" alt="Event Banner" class="event-hero" style="display:none; opacity:0;">

            <div class="event-content">
                <div class="tags-container" id="eventTags">
                    <!-- skeleton tags -->
                    <span class="skeleton sk-tag"></span>
                    <span class="skeleton sk-tag"></span>
                    <span class="skeleton sk-tag" style="width:60px;"></span>
                </div>

                <div id="eventBody" style="margin-top: 2rem;">
                    <!-- skeleton lines -->
                    <span class="skeleton sk-line"></span>
                    <span class="skeleton sk-line"></span>
                    <span class="skeleton sk-line"></span>
                    <span class="skeleton sk-line-sm"></span>
                    <span class="skeleton sk-line" style="margin-top:1.4rem;"></span>
                    <span class="skeleton sk-line"></span>
                    <span class="skeleton sk-line-sm"></span>
                </div>
            </div>
        </article>
    </main>

    <footer style="background-color: var(--bg-dark); color: white; padding: 3rem 0;">
        <div class="container" style="text-align: center;">
            <div class="logo" style="justify-content: center; margin-bottom: 1rem; color: white;">
                <img src="assets/images/logo.png" alt="Logo"
                    style="height: 35px; width: auto; object-fit: contain; margin-right: 8px;">
                Massavu<span>Sports</span>
            </div>
            <p style="color: #9ca3af;">The premier platform for Ugandan local football events.</p>
            <div style="margin-top: 2rem; display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;">
                <a href="index.html" style="color: #d1d5db;">Home</a>
                <a href="about.html" style="color: #d1d5db;">About Us</a>
                <a href="contact.html" style="color: #d1d5db;">Contact Us</a>
                <a href="disclaimer.html" style="color: #d1d5db;">Disclaimer</a>
                <a href="privacy.html" style="color: #d1d5db;">Privacy Policy</a>
            </div>
            <p style="color: #6b7280; margin-top: 2rem; font-size: 0.9rem;">&copy; 2026 MassavuSports. All rights
                reserved.</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>

</html>
